name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup toolchains with mise
        uses: jdx/mise-action@v3

      - run: bun install --frozen-lockfile

      - name: Set version from tag
        run: npm --prefix packages/nx-aws-cache version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build
        run: bun nx build nx-aws-cache

      - name: Publish
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_TOKEN }}
          npm publish dist/packages/nx-aws-cache --access public --tag $DIST_TAG
        env:
          DIST_TAG: ${{ contains(github.ref_name, '-') && 'next' || 'latest' }}
          NPM_CONFIG_PROVENANCE: true
